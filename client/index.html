<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Class Timetable</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      margin: 0;
      background: #f4f6f8;
      padding: 0;
    }

    /* Top header */
    .header {
      background: #1f2937;
      color: white;
      padding: 15px 30px;
      font-size: 22px;
      font-weight: bold;
    }

    /* Main container */
    .container {
      max-width: 1100px;
      margin: 30px auto;
      background: white;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h2 {
      margin-top: 0;
      color: #1f2937;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 15px;
    }

    select, button {
      padding: 8px 12px;
      font-size: 15px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      background: #2563eb;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
      background: white;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 10px;
      text-align: center;
    }

    th {
      background: #e5e7eb;
      color: #111827;
    }

    tr:nth-child(even) {
      background: #f9fafb;
    }

    .break {
      background: #ffe4b5 !important;
      font-weight: bold;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .container {
        margin: 15px;
        padding: 15px;
      }

      th, td {
        font-size: 14px;
        padding: 8px;
      }
    }
  </style>
</head>

<body>

  <div class="header">
    📚 Class Timetable Portal
  </div>

  <div class="container">

    <h2>View Timetable</h2>

    <div class="controls">
      <label><strong>Select Class:</strong></label>

      <select id="classSelect">
        <option value="1">FY</option>
        <option value="2">SY</option>
        <option value="3">TY</option>
      </select>

      <button onclick="loadTimetable()">Load Timetable</button>
    </div>

    <table id="timetable">
      <thead>
        <tr>
          <th>Time</th>
          <th>Monday</th>
          <th>Tuesday</th>
          <th>Wednesday</th>
          <th>Thursday</th>
          <th>Friday</th>
          <th>Saturday</th>
        </tr>
      </thead>
      <tbody>
        <!-- Data will be inserted by view.js -->
      </tbody>
    </table>

  </div>

  <!-- IMPORTANT: KEEP THIS -->
  <script src="view.js"></script>

</body>
</html>
