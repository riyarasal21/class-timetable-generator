<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Delete Timetable Entry</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      padding: 30px;
    }

    .container {
      max-width: 600px;
      margin: auto;
      background: #ffffff;
      padding: 25px;
      border-radius: 8px;
      box-shadow: 0 0 12px rgba(0, 0, 0, 0.1);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-top: 12px;
      font-weight: bold;
    }

    select {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 20px;
      border: none;
      font-size: 16px;
      cursor: pointer;
      border-radius: 5px;
    }

    .load-btn {
      background: #007bff;
      color: white;
    }

    .delete-btn {
      background: #dc3545;
      color: white;
    }

    .back-btn {
      background: #6c757d;
      color: white;
    }

    .info-box {
      margin-top: 20px;
      padding: 15px;
      background: #f8f9fa;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
  </style>
</head>

<body>

<div class="container">

  <h2>Delete Timetable Entry</h2>

  <label>Class</label>
  <select id="class_id"></select>

  <label>Day</label>
  <select id="day">
    <option value="">Select</option>
    <option>Monday</option>
    <option>Tuesday</option>
    <option>Wednesday</option>
    <option>Thursday</option>
    <option>Friday</option>
    <option>Saturday</option>
  </select>

  <label>Time Slot</label>
  <select id="time_slot_id"></select>

  <button class="load-btn" onclick="loadTimetable()">Load Entry</button>

  <div class="info-box" id="details" style="display:none;">
    <input type="hidden" id="timetable_id">

    <p><b>Entry Type:</b> <span id="type"></span></p>
    <p><b>Room / Lab:</b> <span id="place"></span></p>

    <button class="delete-btn" onclick="deleteTimetable()">
      Delete Timetable Entry
    </button>
  </div>

  <!-- 🔙 BACK BUTTON AT BOTTOM -->
  <button class="back-btn" onclick="goBack()">Back to Dashboard</button>

</div>

<script>
const API = "http://localhost:3000/api";

/* Load dropdowns */
document.addEventListener("DOMContentLoaded", () => {
  load("/classes", "class_id", "class_id", "class_name");
  load("/timeslots", "time_slot_id", "time_slot_id", "time");
});

function load(endpoint, id, value, text) {
  fetch(API + endpoint)
    .then(res => res.json())
    .then(data => {
      const select = document.getElementById(id);
      select.innerHTML = `<option value="">Select</option>`;
      data.forEach(x => {
        select.innerHTML += `<option value="${x[value]}">${x[text]}</option>`;
      });
    })
    .catch(err => console.error(err));
}

/* Load timetable entry */
function loadTimetable() {
  const class_id = document.getElementById("class_id").value;
  const day = document.getElementById("day").value;
  const time_slot_id = document.getElementById("time_slot_id").value;

  if (!class_id || !day || !time_slot_id) {
    alert("Please select Class, Day and Time Slot");
    return;
  }

  fetch(`${API}/timetable/${class_id}/${day}/${time_slot_id}`)
    .then(res => res.json())
    .then(data => {
      if (!data.length) {
        alert("No timetable entry found!");
        document.getElementById("details").style.display = "none";
        return;
      }

      const t = data[0];

      document.getElementById("timetable_id").value = t.timetable_id;
      document.getElementById("type").innerText = t.entry_type;

      if (t.entry_type === "LECTURE") {
        document.getElementById("place").innerText = t.room_name || "-";
      } else if (t.entry_type === "PRACTICAL") {
        document.getElementById("place").innerText = t.lab_name || "-";
      } else {
        document.getElementById("place").innerText = "-";
      }

      document.getElementById("details").style.display = "block";
    })
    .catch(err => console.error(err));
}

/* Delete timetable entry */
function deleteTimetable() {
  const id = document.getElementById("timetable_id").value;

  if (!confirm("Are you sure you want to delete this timetable entry?")) return;

  fetch(`${API}/timetable/${id}`, { method: "DELETE" })
    .then(res => {
      if (res.ok) {
        alert("✅ Timetable deleted successfully!");
        location.reload();
      } else {
        alert("❌ Delete failed!");
      }
    })
    .catch(err => console.error(err));
}

/* Back to Dashboard */
function goBack() {
  window.location.href = "admin-dashboard.html";
}
</script>

</body>
</html>
